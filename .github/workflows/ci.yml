name: CI

on:
  push:
    branches: [ "main" ]
    tags: [ 'v*.*.*' ]
  pull_request:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*','**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build on Unix (macOS / Linux)
        if: runner.os != 'Windows'
        run: |
          if [ ! -f ./gradlew ]; then gradle wrapper; fi
          ./gradlew :core:build --no-daemon
        shell: bash

      - name: Build on Windows
        if: runner.os == 'Windows'
        run: |
          if (Test-Path .\gradlew.bat) { .\gradlew.bat :core:build --no-daemon } else { gradle wrapper; .\gradlew.bat :core:build --no-daemon }
        shell: pwsh

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Publish to GitHub Packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ ! -f ./gradlew ]; then gradle wrapper; fi
          ./gradlew :core:publish --no-daemon
        shell: bash
